<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 350">
  <defs>
    <linearGradient id="bg_cups_ace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f1a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow_cups_ace" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Card Background -->
  <rect width="200" height="350" rx="15" fill="url(#bg_cups_ace)"/>
  <rect width="200" height="350" rx="15" fill="url(#glow_cups_ace)"/>
  <!-- Border -->
  <rect x="5" y="5" width="190" height="340" rx="12" fill="none" stroke="#3498db" stroke-width="2"/>
  <!-- Card Number (top left) -->
  <text x="15" y="30" font-family="Georgia, serif" font-size="18" fill="#3498db">Ace</text>
  <!-- Suit Symbol (top right) -->
  <text x="185" y="30" font-family="Arial, sans-serif" font-size="20" fill="#3498db" text-anchor="end">🜄</text>
  <!-- Center Suit Symbol -->
  <g transform="translate(100, 175)">
    <circle r="55" fill="none" stroke="#3498db" stroke-width="1" opacity="0.5"/>
    <circle r="45" fill="none" stroke="#3498db" stroke-width="0.5" opacity="0.3"/>
    <text x="0" y="7" font-family="Arial, sans-serif" font-size="60" fill="#3498db" text-anchor="middle">🜄</text>
  </g>
  <!-- Card Name (bottom) -->
  <text x="100" y="330" font-family="Georgia, serif" font-size="12" fill="white" text-anchor="middle">圣杯Ace</text>
  <!-- Decorative elements -->
  <circle cx="30" cy="60" r="2" fill="#3498db" opacity="0.5"/>
  <circle cx="170" cy="80" r="1.5" fill="#3498db" opacity="0.4"/>
  <circle cx="40" cy="280" r="1" fill="#3498db" opacity="0.3"/>
  <circle cx="160" cy="250" r="1.5" fill="#3498db" opacity="0.4"/>
  <!-- Card ID at bottom left -->
  <text x="15" y="320" font-family="Arial, sans-serif" font-size="8" fill="#3498db" opacity="0.5">cups_ace</text>
</svg>