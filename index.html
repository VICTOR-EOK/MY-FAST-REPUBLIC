<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <link rel="stylesheet" href="/MY-FAST-REPUBLIC/assets/uni.c0ed7990.css">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>塔罗秘境</title>

    <!-- 拦截 uni.request 看是什么请求在超时 -->
    <script>
    (function() {
      // 在 uni 对象创建前先存起来
      window.__UNI_REQ_LOG = [];
      
      // 用 Proxy 拦截 uni 对象创建后的 request 方法
      // 方案：在 script 加载前重写 XMLHttpRequest 和 fetch
      var _fetch = window.fetch;
      window.fetch = function(url) {
        var entry = 'FETCH: ' + String(url).slice(0, 100);
        window.__UNI_REQ_LOG.push(entry);
        document.title = entry.slice(0, 40);
        console.log(entry);
        return _fetch.apply(this, arguments);
      };
      
      var _xhrOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function(method, url) {
        var entry = 'XHR: ' + method + ' ' + String(url).slice(0, 100);
        window.__UNI_REQ_LOG.push(entry);
        document.title = entry.slice(0, 40);
        console.log(entry);
        return _xhrOpen.apply(this, arguments);
      };
      
      window.addEventListener('error', function(e) {
        window.__UNI_REQ_LOG.push('ERROR: ' + e.message);
        document.title = 'ERR:' + e.message.slice(0, 30);
      });
    })();
    </script>

    <script type="module" crossorigin src="/MY-FAST-REPUBLIC/assets/index-DSrB0gEU.js"></script>
    <link rel="stylesheet" crossorigin href="/MY-FAST-REPUBLIC/assets/index-G5lEs2jr.css">
  </head>
  <body>
    <div id="app"></div>
  </body>
</html>
